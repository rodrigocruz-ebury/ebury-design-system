<!doctype html>
<html><head><meta charset="utf-8"><title>Bullet list</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#F5F5F5;padding:22px;font-family:var(--font-body);color:#231F20}
  .item{display:grid;grid-template-columns:36px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid rgba(116,116,116,.35)}

  .arr{font-size:22px;color:#231F20;line-height:1}
  .t{font-size:16px;font-weight:500;margin-bottom:4px}
  .d{font-size:13px;color:#6a6a6a;line-height:1.4;font-weight:400}
</style></head><body>
  <div class="item"><div class="arr">→</div><div><div class="t">Cross‑border payments</div><div class="d">Send and receive in 140+ currencies with local‑rail speed.</div></div></div>
  <div class="item"><div class="arr">→</div><div><div class="t">FX risk management</div><div class="d">Hedging, forwards and options, matched to your exposure.</div></div></div>
  <div class="item"><div class="arr">→</div><div><div class="t">Trade finance</div><div class="d">Working‑capital facilities that move at the speed of business.</div></div></div>
</body></html>
