<!doctype html>
<html><head><meta charset="utf-8"><title>Chip & Button</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#F5F5F5;padding:22px;font-family:var(--font-body);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;border-radius:999px;background:#231F20;border:1.8px solid rgba(116,116,116,.5);color:#fff;font-weight:500;font-size:16px;line-height:1.2}
  .chip.light{background:#fff;color:#231F20;border-color:#E0E0E0}
  .chip.blue{background:#74B0CA;color:#231F20;border-color:transparent}
  .chip .arr{font-size:18px;margin-left:4px}
</style></head><body>
  <span class="chip">Learn more <span class="arr">→</span></span>
  <span class="chip light">Secondary</span>
  <span class="chip blue">Open account <span class="arr">→</span></span>
</body></html>
