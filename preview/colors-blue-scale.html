<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Blue scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid #eee}
  .chip{height:72px}
  .meta{padding:6px 8px;font-size:11px;line-height:1.3;background:#fff}
  .meta b{font-weight:600;display:block}
  .meta span{color:#777;font-family:ui-monospace,monospace;font-size:10px}
</style></head><body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#234862"></div><div class="meta"><b>navy</b><span>#234862</span></div></div>
  <div class="sw"><div class="chip" style="background:#527383"></div><div class="meta"><b>steel</b><span>#527383</span></div></div>
  <div class="sw"><div class="chip" style="background:#74B0CA"></div><div class="meta"><b>blue</b><span>#74B0CA</span></div></div>
  <div class="sw"><div class="chip" style="background:#90C0D5"></div><div class="meta"><b>blue‑200</b><span>#90C0D5</span></div></div>
  <div class="sw"><div class="chip" style="background:#B4D4E2"></div><div class="meta"><b>blue‑100</b><span>#B4D4E2</span></div></div>
  <div class="sw"><div class="chip" style="background:#E3EFF4"></div><div class="meta"><b>blue‑25</b><span>#E3EFF4</span></div></div>
</div></body></html>
