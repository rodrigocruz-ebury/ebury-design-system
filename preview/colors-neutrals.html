<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid #eee}
  .chip{height:72px}
  .meta{padding:6px 8px;font-size:11px;line-height:1.3;background:#fff}
  .meta b{font-weight:600;display:block}
  .meta span{color:#777;font-family:ui-monospace,monospace;font-size:10px}
</style></head><body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#231F20"></div><div class="meta"><b>ink</b><span>#231F20</span></div></div>
  <div class="sw"><div class="chip" style="background:#333031"></div><div class="meta"><b>ink‑2</b><span>#333031</span></div></div>
  <div class="sw"><div class="chip" style="background:#747474"></div><div class="meta"><b>gray‑700</b><span>#747474</span></div></div>
  <div class="sw"><div class="chip" style="background:#E0E0E0"></div><div class="meta"><b>gray‑150</b><span>#E0E0E0</span></div></div>
  <div class="sw"><div class="chip" style="background:#F5F5F5"></div><div class="meta"><b>gray‑100</b><span>#F5F5F5</span></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;outline:1px solid #eee;outline-offset:-1px"></div><div class="meta"><b>white</b><span>#FFFFFF</span></div></div>
</div></body></html>
