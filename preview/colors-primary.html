<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid #eee}
  .chip{height:72px}
  .meta{padding:8px 10px;font-size:12px;line-height:1.3;display:flex;justify-content:space-between;gap:6px;background:#fff}
  .meta b{font-weight:600}
  .meta span{color:#777;font-family:ui-monospace,monospace;font-size:11px}
</style></head><body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#74B0CA"></div><div class="meta"><b>Ebury blue</b><span>#74B0CA</span></div></div>
  <div class="sw"><div class="chip" style="background:#234862"></div><div class="meta"><b>Navy</b><span>#234862</span></div></div>
  <div class="sw"><div class="chip" style="background:#231F20"></div><div class="meta"><b>Ink</b><span>#231F20</span></div></div>
  <div class="sw"><div class="chip" style="background:#9FF6F3"></div><div class="meta"><b>Mint</b><span>#9FF6F3</span></div></div>
</div></body></html>
