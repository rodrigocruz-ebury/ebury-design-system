<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F5F5F5;padding:18px;font-family:var(--font-body);color:#231F20}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .tile{background:#E0E0E0;border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .tile img{width:56%;height:56%}
  .lab{font-size:10px;text-align:center;margin-top:4px;color:#747474;font-family:ui-monospace,monospace}
  .cell{display:flex;flex-direction:column}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="tile"><img src="../assets/icons/building.svg" alt=""></div><div class="lab">building</div></div>
  <div class="cell"><div class="tile"><img src="../assets/icons/person.svg" alt=""></div><div class="lab">person</div></div>
  <div class="cell"><div class="tile"><img src="../assets/icons/globe.svg" alt=""></div><div class="lab">globe</div></div>
  <div class="cell"><div class="tile"><img src="../assets/icons/currency-pound.svg" alt=""></div><div class="lab">gbp</div></div>
  <div class="cell"><div class="tile"><img src="../assets/icons/currency-dollar.svg" alt=""></div><div class="lab">usd</div></div>
  <div class="cell"><div class="tile"><img src="../assets/icons/umbrella.svg" alt=""></div><div class="lab">hedge</div></div>
</div>
</body></html>
