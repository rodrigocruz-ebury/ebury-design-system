<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;padding:18px;font-family:var(--font-body);color:#231F20}
  .row{display:flex;align-items:center;gap:12px;margin:8px 0;font-size:12px}
  .bar{background:#74B0CA;height:16px;border-radius:2px}
  .tag{width:100px;color:#747474;font-family:ui-monospace,monospace}
  .val{width:60px;color:#231F20;font-weight:600}
</style></head><body>
  <div class="row"><span class="tag">--space-2</span><span class="val">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">--space-4</span><span class="val">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">--space-6</span><span class="val">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">--space-8</span><span class="val">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">--space-12</span><span class="val">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">--space-16</span><span class="val">64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tag">--space-24</span><span class="val">96</span><div class="bar" style="width:96px"></div></div>
</body></html>
