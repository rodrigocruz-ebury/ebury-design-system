<!doctype html>
<html><head><meta charset="utf-8"><title>Stat cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#231F20;padding:32px;font-family:var(--font-body);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
  .cell{border:1px solid #fff;padding:36px 28px;display:flex;flex-direction:column;justify-content:space-between;gap:18px;aspect-ratio:1/.6;margin-left:-1px;margin-top:-1px}
  .n{font-family:"KMR Apparat","Helvetica Neue Light","HelveticaNeue-Light","Helvetica Neue",sans-serif;font-weight:300;font-size:80px;line-height:.9;color:#74B0CA;letter-spacing:-.015em}
  .lab{font-weight:500;font-size:15px;line-height:1.2;color:#fff;max-width:200px}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="n">140+</div><div class="lab">countries to send payments</div></div>
  <div class="cell"><div class="n">45+</div><div class="lab">offices all over the globe</div></div>
  <div class="cell"><div class="n">17k</div><div class="lab">active corporate clients</div></div>
</div>
</body></html>
