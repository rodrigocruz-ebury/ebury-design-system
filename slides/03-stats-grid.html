<!doctype html>
<html><head><meta charset="utf-8"><title>Stats grid</title>
<link rel="stylesheet" href="slide.css">
<style>
  .title{position:absolute;left:96px;top:96px;font-family:var(--font-display);font-weight:400;font-size:84px;line-height:1;color:#fff;margin:0;letter-spacing:-.005em}
  .stat-grid{position:absolute;left:96px;right:96px;top:260px;bottom:96px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:0}
  .cell{padding:48px 56px 48px 0;display:flex;flex-direction:column;justify-content:flex-start;gap:28px;position:relative}
  .cell + .cell{padding-left:56px}
  /* hairline dividers: vertical between cols, horizontal between rows */
  .cell:not(:nth-child(3n))::after{content:"";position:absolute;right:0;top:16px;bottom:16px;width:1px;background:rgba(255,255,255,.28)}
  .cell:nth-child(n+4)::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:rgba(255,255,255,.28)}
  .n{font-family:var(--font-display);font-weight:300;font-size:150px;line-height:.95;color:#74B0CA;letter-spacing:-.02em}
  .lab{font-family:var(--font-body);font-weight:400;font-size:26px;line-height:1.25;color:#fff;max-width:360px}
  .lead{font-family:var(--font-body);font-weight:400;font-size:30px;line-height:1.25;color:#fff;max-width:380px}
</style>
</head><body>
<div class="scaler" id="s">
<div class="slide bg-ink">
  <h1 class="title">Our scale &amp; reach</h1>

  <div class="stat-grid">
    <!-- row 1 -->
    <div class="cell">
      <div class="lead">We are one of the fastest‑growing global fintech companies</div>
    </div>
    <div class="cell">
      <div class="n">140+</div>
      <div class="lab">currencies supported</div>
    </div>
    <div class="cell">
      <div class="n">160+</div>
      <div class="lab">countries to send payments</div>
    </div>
    <!-- row 2 -->
    <div class="cell">
      <div class="n">1,800+</div>
      <div class="lab">experts offering local, multilingual support</div>
    </div>
    <div class="cell">
      <div class="n">30+</div>
      <div class="lab">regulated markets</div>
    </div>
    <div class="cell">
      <div class="n">45+</div>
      <div class="lab">offices all over the globe</div>
    </div>
  </div>
</div>
</div>
<script>
  const el=document.getElementById('s');
  const fit=()=>{const s=Math.min(innerWidth/1920,innerHeight/1080);el.style.transform=`scale(${s})`};
  fit();addEventListener('resize',fit);
</script>
</body></html>
