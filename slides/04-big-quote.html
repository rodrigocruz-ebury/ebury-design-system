<!doctype html>
<html><head><meta charset="utf-8"><title>Big quote</title>
<link rel="stylesheet" href="slide.css">
</head><body>
<div class="scaler" id="s">
<div class="slide bg-ink" style="display:flex;align-items:center;justify-content:center">
  <div style="max-width:1440px;padding:0 96px;text-align:center">
    <div style="font-family:var(--font-display);font-weight:300;font-size:80px;line-height:1.1;letter-spacing:-.005em;color:#fff">
      Ebury gave us one platform for every currency our business touches — FX, payments and liquidity, in one place.
    </div>
    <div style="margin-top:36px;font-family:var(--font-body);font-weight:400;font-size:24px;color:#fff;opacity:.75">
      Jordan Mbeki / Atlas Global Trading
    </div>
  </div>
</div>
</div>
<script>
  const el=document.getElementById('s');
  const fit=()=>{const s=Math.min(innerWidth/1920,innerHeight/1080);el.style.transform=`scale(${s})`};
  fit();addEventListener('resize',fit);
</script>
</body></html>
