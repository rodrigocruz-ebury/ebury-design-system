<!doctype html>
<html><head><meta charset="utf-8"><title>Closing / Contact</title>
<link rel="stylesheet" href="slide.css">
</head><body>
<div class="scaler" id="s">
<div class="slide bg-ink">
  <h1 style="position:absolute;left:96px;top:96px;font-family:var(--font-display);font-weight:400;font-size:120px;line-height:.9;color:#fff;max-width:1100px;margin:0">Let’s build your global platform.</h1>

  <div style="position:absolute;left:96px;top:700px;right:96px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;color:#fff">
    <div>
      <div style="font-size:14px;color:#B9B9B9;margin-bottom:10px">Email</div>
      <div style="font-size:28px;font-weight:500">info@ebury.com</div>
    </div>
    <div>
      <div style="font-size:14px;color:#B9B9B9;margin-bottom:10px">Web</div>
      <div style="font-size:28px;font-weight:500">ebury.com</div>
    </div>
    <div>
      <div style="font-size:14px;color:#B9B9B9;margin-bottom:10px">Follow</div>
      <div style="font-size:28px;font-weight:500">@eburyfx</div>
    </div>
  </div>

  <div style="position:absolute;left:96px;right:96px;top:660px;border-top:1px solid rgba(255,255,255,.2)"></div>
  <img src="../assets/logo/ebury-logo.svg" alt="ebury" style="position:absolute;right:96px;bottom:96px;width:280px;filter:invert(1)">
</div>
</div>
<script>
  const el=document.getElementById('s');
  const fit=()=>{const s=Math.min(innerWidth/1920,innerHeight/1080);el.style.transform=`scale(${s})`};
  fit();addEventListener('resize',fit);
</script>
</body></html>
